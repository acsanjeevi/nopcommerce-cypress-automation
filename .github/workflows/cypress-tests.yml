name: Cypress E2E Tests

on:
  # Trigger on code changes
  push:
    branches: [develop]
  pull_request:
    branches: [main]

  # Scheduled daily run — 6:00 AM IST (00:30 UTC)
  # Runs every day; ideal time: before work starts, fresh results on dashboard
  schedule:
    - cron: '30 0 * * *'

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test (chrome, firefox, edge, or all)'
        required: false
        default: 'chrome'

jobs:
  cypress-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser != 'all' && fromJson(format('["{0}"]', github.event.inputs.browser)) || fromJson('["chrome","firefox","edge"]') }}

    name: Tests — ${{ matrix.browser }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@latest

      - name: Install Edge
        if: matrix.browser == 'edge'
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft-edge.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-edge.gpg] https://packages.microsoft.com/repos/edge stable main" | sudo tee /etc/apt/sources.list.d/microsoft-edge.list
          sudo apt-get update
          sudo apt-get install -y microsoft-edge-stable

      - name: Start nopCommerce via Docker Compose
        run: docker compose up -d

      - name: Wait for nopCommerce to be healthy
        run: |
          echo "Waiting for nopCommerce at http://localhost:8080..."
          timeout=300
          elapsed=0
          until curl -sf -o /dev/null http://localhost:8080 || [ $elapsed -ge $timeout ]; do
            sleep 10
            elapsed=$((elapsed + 10))
            echo "  Still waiting... ${elapsed}s"
          done
          if [ $elapsed -ge $timeout ]; then
            echo "ERROR: nopCommerce did not start within ${timeout}s"
            docker compose logs
            exit 1
          fi
          echo "nopCommerce is ready! Waiting 60s for full stabilization..."
          sleep 60

      - name: Create secured.env
        run: |
          cat > secured.env <<'EOF'
          CYPRESS_BASE_URL=http://localhost:8080
          CYPRESS_ADMIN_URL=http://localhost:8080
          CYPRESS_CUSTOMER_EMAIL=acsanjeevi@gmail.com
          CYPRESS_CUSTOMER_PASSWORD=Test@1234
          CYPRESS_CUSTOMER_USERNAME=Sanjeevi
          CYPRESS_ADMIN_EMAIL=admin@yourstore.com
          CYPRESS_ADMIN_PASSWORD=admin
          CYPRESS_ENCRYPTION_KEY=ecommerce-aes-secret-key-2026
          CYPRESS_ROLE=admin
          CYPRESS_REPORT_FILENAME=[name]-report
          EOF

      - name: Run Cypress tests (${{ matrix.browser }})
        env:
          BROWSER: ${{ matrix.browser }}
        run: node run-all-modules.mjs

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-html-report-${{ matrix.browser }}
          path: cypress/reports/*.html
          retention-days: 30

      - name: Upload trend dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-dashboard-${{ matrix.browser }}
          path: test-history/trend-dashboard.html
          retention-days: 30

      - name: Upload test history data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-history-${{ matrix.browser }}
          path: test-history/*.json
          retention-days: 90

      - name: Send test report email
        if: always()
        env:
          BROWSER: ${{ matrix.browser }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_EMAIL: acsanjeevi@gmail.com
        run: node send-report-email.mjs || echo "Email send skipped (SMTP secrets not configured)"

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots/
          retention-days: 14

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/videos/
          retention-days: 14
